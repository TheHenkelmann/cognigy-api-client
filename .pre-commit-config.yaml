repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'mkdir -p .mypy_stubs && ln -sfn ../src .mypy_stubs/cognigy && MYPYPATH=.mypy_stubs python3 -m mypy -p cognigy'
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
